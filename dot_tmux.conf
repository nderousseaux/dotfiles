# ~/.tmux.conf — Configuration minimaliste (invisible)

# ------- Général -------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"  # True color
set -g mouse on
set -g base-index 1                 # Fenêtres numérotées à partir de 1
setw -g pane-base-index 1          # Idem pour les panes
set -g renumber-windows on          # Renumérotation auto
set -g escape-time 0                # Pas de délai après Escape
set -g history-limit 50000
set -g focus-events on

# ------- Invisible : pas de status bar -------
set -g status off

# Préfixe par défaut : Ctrl+B
